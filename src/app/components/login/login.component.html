<div class="contenedor-login">
  <div class="login-box">
    <!-- Logo -->
    <div class="logo-section">
      <div class="logo">🏊</div>
      <h1>GestiPool</h1>
      <p>Gestión Inteligente de Piscinas</p>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="login()" class="formulario">
      <!-- Error message -->
      @if (error()) {
        <div class="alerta-error">
          {{ error() }}
        </div>
      }

      <!-- Email -->
      <div class="grupo-formulario">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="tu@email.com"
          [disabled]="cargando()"
          required
        />
      </div>

      <!-- Contraseña -->
      <div class="grupo-formulario">
        <label for="password">Contraseña</label>
        <div class="password-contenedor">
          <input
            id="password"
            [type]="mostrarPassword() ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            [disabled]="cargando()"
            (keypress)="onKeyPress($event)"
            required
          />
          <button
            type="button"
            class="btn-mostrar-password"
            (click)="toggleMostrarPassword()"
            [disabled]="cargando()"
            title="Mostrar/Ocultar contraseña"
          >
            {{ mostrarPassword() ? '👁️' : '👁️‍🗨️' }}
          </button>
        </div>
      </div>

      <!-- Botón Login -->
      <button
        type="submit"
        class="btn-login"
        [disabled]="cargando()"
      >
        {{ cargando() ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
      </button>
    </form>

    <!-- Footer -->
    <div class="footer">
      <p>¿Necesitas acceso? Contacta al administrador</p>
    </div>
  </div>
</div>
